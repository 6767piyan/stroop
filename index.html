<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop 新加坡節點連線測試</title>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #1a1d29; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; border: 2px solid #ffcc00; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; }
        #status { color: #00ffcc; margin-top: 20px; }
        #debug { background: #24293c; color: #ff8888; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; font-family: monospace; display: none; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        // 內含你真正的新加坡 Realtime Database 網址與憑證
        const firebaseConfig = {
            apiKey: "AIzaSyA8n5tXK2ObAWT9KU5j8I3FWtC2SWxQi9U",
            authDomain: "stroop-8b787.firebaseapp.com",
            databaseURL: "https://stroop-8b787-default-rtdb.asia-southeast1.firebasedatabase.app", // 這裡已修正為新加坡
            projectId: "stroop-8b787",
            storageBucket: "stroop-8b787.firebasestorage.app",
            messagingSenderId: "880652461108",
            appId: "1:880652461108:web:e14317f54e46454ed31661",
            measurementId: "G-MVT8W43KLX"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendSingaporeTest() {
            const statusEl = document.getElementById('status');
            const debugEl = document.getElementById('debug');
            statusEl.innerText = "正在連線新加坡伺服器...";
            debugEl.style.display = "none";

            const data = {
                Username: "新加坡連線測試員",
                Status: "成功通電",
                Timestamp: new Date().toISOString()
            };

            // 直接發送至資料庫，不透過 Auth 模組
            database.ref('stroop_results').push(data, (error) => {
                if (error) {
                    statusEl.innerText = "❌ 連上伺服器，但被資料庫規則拒絕！";
                    debugEl.style.display = "block";
                    debugEl.innerHTML = `<b>詳細原因:</b> ${error.message}<br><br>💡 提示：如果顯示 Permission Denied，代表你需要去 Firebase Console 內把 Realtime Database 的 Rules 改成 true。`;
                } else {
                    statusEl.innerText = "🎉 成功了！資料已經順利寫入新加坡資料庫！";
                }
            });
        }
    </script>
</head>
<body>
    <div class="box">
        <h2>🇸🇬 測試：新加坡節點精準連線</h2>
        <p>已移除非必要的驗證功能，改用純資料庫連線。請點擊按鈕：</p>
        <button onclick="sendSingaporeTest()">發送測試數據</button>
        <h3 id="status">等候指令中</h3>
        <div id="debug"></div>
    </div>
</body>
</html>
