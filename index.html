<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop 聯體測試端</title>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #1a1d29; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 10px; }
        #debug { background: #24293c; color: #ff8888; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; font-family: monospace; display: none; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8n5tXK2ObAWT9KU5j8I3FWtC2SWxQi9U",
            authDomain: "stroop-8b787.firebaseapp.com",
            databaseURL: "https://stroop-8b787-default-rtdb.firebaseio.com",
            projectId: "stroop-8b787"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendTestData() {
            const data = {
                Username: "連線測試員",
                Phase: 1,
                PhaseType: "test",
                Trial: 1,
                Response: "測試點擊",
                Accuracy: 1,
                RT_ms: 500,
                Timestamp: new Date().toISOString()
            };

            document.getElementById('status').innerText = "正在發送數據...";
            
            database.ref('stroop_results').push(data, (error) => {
                if (error) {
                    document.getElementById('status').innerText = "❌ 發送失敗！";
                    document.getElementById('debug').style.display = "block";
                    document.getElementById('debug').innerHTML = `原因：${error.message}<br><br>💡 提示：代表資料庫規則（Rules）目前還是鎖定的，請去 Firebase 後台將 .read 和 .write 改為 true。`;
                } else {
                    document.getElementById('status').innerText = "🎉 發送成功！資料已寫入雲端。";
                    document.getElementById('debug').style.display = "none";
                }
            });
        }
    </script>
</head>
<body>
    <div class="box">
        <h2>測試 1：資料庫連線檢查</h2>
        <p>點擊下方按鈕，測試資料能否傳進你的 Firebase</p>
        <button onclick="sendTestData()">點我發送測試數據</button>
        <h3 id="status">尚未發送</h3>
        <div id="debug"></div>
    </div>
</body>
</html>
